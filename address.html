<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>주소 검색 | ㅇㅇㅇ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f7f9fc;
    margin: 0;
    padding: 0;
    text-align: center;
  }
  .container {
    max-width: 480px;
    margin: 60px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  }
  .btn {
    margin-top: 20px;
    padding: 14px;
    width: 100%;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #2ea44f;
    color: white;
    cursor: pointer;
  }
  input {
    margin-top: 15px;
    width: 94%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 14px;
  }
  .copy-btn { margin-top: 10px; background: #0366d6; }
</style>
</head>

<body>
<div class="container">
  <h1>주소 검색</h1>

  <button class="btn" onclick="openSearch()">주소 검색하기</button>

  <input type="text" id="address" placeholder="검색 결과가 여기에 표시됩니다" readonly />

  <button class="btn copy-btn" onclick="copyAddress()">주소 복사</button>
</div>

<script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

<script>
function openSearch() {
    let width = 500;
    let height = 600;

    // 새 탭(=팝업 차단 안 됨)
    let newWindow = window.open("", "postcodeSearch",
        `width=${width},height=${height},scrollbars=yes,resizable=yes`);

    newWindow.document.write(`
        <div id="postcode" style="width:100%;height:100%;"></div>
        <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"><\/script>
        <script>
            new daum.Postcode({
                oncomplete: function(data) {
                    let addr = "";
                    let extra = "";

                    if (data.userSelectedType === "R") {
                        addr = data.roadAddress;
                        if (data.bname && /[동|로|가]$/g.test(data.bname)) extra += data.bname;
                        if (data.buildingName && data.apartment === "Y")
                            extra += (extra ? ", " : "") + data.buildingName;
                        if (extra) addr += " (" + extra + ")";
                    } else {
                        addr = data.jibunAddress;
                    }

                    // 부모창으로 값 전달
                    window.opener.document.getElementById("address").value =
                        "(" + data.zonecode + ") " + addr;

                    window.close();
                }
            }).embed(document.getElementById("postcode"));
        <\/script>
    `);
}

function copyAddress() {
    const address = document.getElementById("address").value;
    if (!address) return alert("먼저 주소를 검색해주세요.");

    navigator.clipboard.writeText(address).then(() => {
        alert("주소가 복사되었습니다!");
    });
}
</script>
</body>
</html>
