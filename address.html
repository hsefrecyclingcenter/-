<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>주소 입력</title>

<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0; padding: 20px;
    background: #f7f9fc;
  }
  .container {
    max-width: 480px;
    margin: 0 auto;
    background: #fff;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    text-align: center;
  }
  h2 { margin-bottom: 16px; font-size: 22px; }
  .btn {
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    background: #2ea44f;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
  }
  .copy-btn {
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    background: #0069d9;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
  }
  input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 15px;
  }
  .guide {
    margin-top: 20px;
    font-size: 14px;
    color: #444;
    line-height: 1.6;
    background: #fff7d6;
    padding: 15px;
    border-radius: 8px;
    display: none;
  }
  .footer {
    margin-top: 20px;
    color: #aaa;
    font-size: 12px;
  }
</style>
</head>

<body>

<!-- 기존 입력 화면 -->
<div class="container" id="mainContainer">
  <h2>주소 검색하기</h2>

  <button class="btn" onclick="execDaumPostcode()">주소 검색</button>

  <input id="postcode" placeholder="우편번호" readonly />
  <input id="address" placeholder="기본주소" readonly />
  <input id="detailAddress" placeholder="상세주소를 입력하세요" />

  <!-- 버튼명 변경 -->
  <button class="copy-btn" onclick="copyAddress()">주소 복사하기</button>

  <div class="guide" id="guideText">
      주소가 복사되었습니다!<br>
      작성 중이던 <b>구글폼 탭으로 돌아가</b><br>
      주소 입력란(내 답변)에 <b>Ctrl + V</b> 또는 <b>붙여넣기</b> 해주세요.
  </div>

  <div class="footer">© 화성시재활용센터 </div> 
</div>

<!-- 🔥 복사 후 표시될 종료 화면 -->
<div id="finishScreen" style="
  display:none;
  padding:40px;
  text-align:center;
  max-width:480px;
  margin:0 auto;
">
  <div style="
    font-size:64px;
    color:#28a745;
    margin-bottom:20px;
  ">
    ✔
  </div>
  <h2 style="font-size:22px; margin-bottom:10px;">주소 복사 완료</h2>
  <p style="font-size:16px; color:#444; line-height:1.6;">
    이제 <b>작성 중이던 구글폼 탭으로 돌아가</b><br>
    주소 입력란에 <b>Ctrl + V</b> 또는 <b>붙여넣기</b> 해주세요.
  </p>
</div>

<!-- Daum 주소 API -->
<script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

<script>

// 캐시 방지
if (performance.navigation.type === 1) {
    console.log("Page reloaded.");
}

function execDaumPostcode() {
    new daum.Postcode({
        oncomplete: function(data) {

            let addr = "";
            let extra = "";

            if (data.userSelectedType === "R") {
                addr = data.roadAddress;
                if (data.bname && /[동|로|가]$/g.test(data.bname)) extra += data.bname;
                if (data.buildingName && data.apartment === "Y")
                    extra += (extra ? ", " : "") + data.buildingName;
                if (extra) addr += " (" + extra + ")";
            } else {
                addr = data.jibunAddress;
            }

            document.getElementById("postcode").value = data.zonecode;
            document.getElementById("address").value = addr;

            document.getElementById("detailAddress").focus();
        }
    }).open();
}


// 🔥 복사하기 → 종료 화면 흐름
function copyAddress() {

    const postcode = document.getElementById("postcode").value;
    const addr = document.getElementById("address").value;
    const detail = document.getElementById("detailAddress").value;

    if (!addr) {
        alert("먼저 주소 검색을 해주세요!");
        return;
    }

    const fullAddress = "(" + postcode + ") " + addr + " " + detail;

    navigator.clipboard.writeText(fullAddress)
      .then(() => {

        alert("주소가 복사되었습니다!\n이제 구글폼으로 돌아갑니다.");

        // 🔥 창 닫기 시도
        window.open('', '_self');
        window.close();

        // 🔥 닫기 실패 시 종료 화면 활성화
        setTimeout(() => {
            if (!document.hidden) {
                showFinishScreen();
            }
        }, 300);

      })
      .catch(() => {
        alert("복사에 실패했습니다. 브라우저 설정을 확인해주세요.");
      });
}


// 🔥 종료 화면 활성화 함수
function showFinishScreen() {
    document.getElementById('mainContainer').style.display = "none";
    document.getElementById('finishScreen').style.display = "block";
}

</script>

</body>
</html>
