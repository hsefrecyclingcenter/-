<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>주소 입력</title>

<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0; padding: 20px;
    background: #f7f9fc;
  }
  .container {
    max-width: 480px;
    margin: 0 auto;
    background: #fff;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    text-align: center;
  }
  h2 { margin-bottom: 16px; font-size: 22px; }
  .btn {
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    background: #2ea44f;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
  }
  .copy-btn {
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    background: #0069d9;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
  }
  input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 15px;
  }
  .guide {
    margin-top: 20px;
    font-size: 14px;
    color: #444;
    line-height: 1.6;
    background: #fff7d6;
    padding: 15px;
    border-radius: 8px;
    display: none;
  }
  .footer {
    margin-top: 20px;
    color: #aaa;
    font-size: 12px;
  }
</style>
</head>

<body>
<div class="container">
  <h2>주소 검색하기</h2>

  <button class="btn" onclick="execDaumPostcode()">주소 검색</button>

  <input id="postcode" placeholder="우편번호" readonly />
  <input id="address" placeholder="기본주소" readonly />
  <input id="detailAddress" placeholder="상세주소를 입력하세요" />

  <!-- 버튼명 완전히 변경 -->
  <button class="copy-btn" onclick="copyAddress()">주소 복사하기</button>

  <!-- 안내 박스 -->
  <div class="guide" id="guideText">
      주소가 복사되었습니다!<br>
      작성 중이던 <b>구글폼 탭으로 돌아가</b><br>
      주소 입력란(내 답변)에 <b>Ctrl + V</b> 또는 <b>붙여넣기</b> 해주세요.
  </div>

  <div class="footer">© ㅇㅇㅇ</div>
</div>

<!-- Daum 주소 API -->
<script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

<script>

// 캐시 방지 (강제 새로고침)
if (performance.navigation.type === 1) {
    console.log("Page reloaded.");
}

function execDaumPostcode() {
    new daum.Postcode({
        oncomplete: function(data) {

            let addr = "";
            let extra = "";

            if (data.userSelectedType === "R") {
                addr = data.roadAddress;
                if (data.bname && /[동|로|가]$/g.test(data.bname)) extra += data.bname;
                if (data.buildingName && data.apartment === "Y")
                    extra += (extra ? ", " : "") + data.buildingName;
                if (extra) addr += " (" + extra + ")";
            } else {
                addr = data.jibunAddress;
            }

            document.getElementById("postcode").value = data.zonecode;
            document.getElementById("address").value = addr;

            document.getElementById("detailAddress").focus();
        }
    }).open();
}

function copyAddress() {

    const postcode = document.getElementById("postcode").value;
    const addr = document.getElementById("address").value;
    const detail = document.getElementById("detailAddress").value;

    if (!addr) {
        alert("먼저 주소 검색을 해주세요!");
        return;
    }

    const fullAddress = "(" + postcode + ") " + addr + " " + detail;

    navigator.clipboard.writeText(fullAddress)
      .then(() => {
        document.getElementById("guideText").style.display = "block";
        alert("주소가 복사되었습니다!\n이 창을 닫고 구글폼으로 돌아가 붙여 넣기 해주세요.");
      })
      .catch(() => {
        alert("복사에 실패했습니다. 브라우저 설정을 확인해주세요.");
      });
}
</script>

</body>
</html>
