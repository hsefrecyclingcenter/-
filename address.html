<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>주소 검색</title>

<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0; padding: 20px;
    background: #f7f9fc;
  }

  .container {
    max-width: 480px;
    margin: 0 auto;
    background: #fff;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    text-align: center;
  }

  h2 { margin-bottom: 16px; font-size: 22px; }

  .btn {
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    background: #2ea44f;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
  }

  input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 15px;
  }

  .footer {
    margin-top: 20px;
    color: #aaa;
    font-size: 12px;
  }
</style>
</head>

<body>
<div class="container">
  <h2>주소 검색하기</h2>

  <button class="btn" onclick="execDaumPostcode()">주소 검색</button>

  <input id="postcode" placeholder="우편번호" readonly />
  <input id="address" placeholder="기본주소" readonly />
  <input id="detailAddress" placeholder="상세주소를 입력하세요" />

  <button class="btn" style="background:#0069d9" onclick="sendToGoogleForm()">구글폼으로 보내기</button>

  <div class="footer">© 화성시재활용센터 </div>
</div>

<!-- Daum Postcode API -->
<script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

<script>
// 주소 검색(카카오)
function execDaumPostcode() {
    new daum.Postcode({
        oncomplete: function(data) {

            let addr = "";
            let extra = "";

            // 도로명 / 지번 주소 구분
            if (data.userSelectedType === "R") {
                addr = data.roadAddress;

                // 동, 건물명 등 추가 정보
                if (data.bname && /[동|로|가]$/g.test(data.bname)) extra += data.bname;
                if (data.buildingName && data.apartment === "Y")
                    extra += (extra ? ", " : "") + data.buildingName;

                if (extra) addr += " (" + extra + ")";
            } else {
                addr = data.jibunAddress;
            }

            // 입력칸 자동 채우기
            document.getElementById("postcode").value = data.zonecode;
            document.getElementById("address").value = addr;

            // 상세주소 입력칸으로 포커스 이동
            document.getElementById("detailAddress").focus();
        }
    }).open();
}

// 구글폼 자동 전달
function sendToGoogleForm() {

    const postcode = document.getElementById("postcode").value;
    const addr = document.getElementById("address").value;
    const detail = document.getElementById("detailAddress").value;

    if (!addr) {
        alert("먼저 주소 검색을 해주세요!");
        return;
    }

    const fullAddress = "(" + postcode + ") " + addr + " " + detail;

    // 구글폼 Entry 번호 = 31860817
    const sendUrl =
"https://docs.google.com/forms/d/e/1FAIpQLSf8mCi04LJ-OnCdvOWCEQmpHg1Sgm-MUt4w6roU9v1N2GBoag/viewform?usp=pp_url"
+ "&entry.31860817=" + encodeURIComponent(fullAddress);

    // 구글폼 열기
    window.location.href = sendUrl;
}
</script>

</body>
</html>
