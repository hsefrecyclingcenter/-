<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>주소 입력</title>

<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0; padding: 20px;
    background: #f7f9fc;
  }
  .container {
    max-width: 480px;
    margin: 0 auto;
    background: #fff;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    text-align: center;
  }
  h2 { margin-bottom: 16px; font-size: 22px; }
  .btn {
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    background: #2ea44f;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
  }
  input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 15px;
  }
  .footer {
    margin-top: 20px;
    color: #aaa;
    font-size: 12px;
  }
</style>
</head>

<body>
<div class="container">
  <h2>주소 검색하기</h2>

  <button class="btn" onclick="execDaumPostcode()">주소 검색</button>

  <input id="postcode" placeholder="우편번호" readonly />
  <input id="address" placeholder="기본주소" readonly />
  <input id="detailAddress" placeholder="상세주소를 입력하세요" />

  <button class="btn" style="background:#0069d9" onclick="autoSubmit()">자동 제출하기</button>

  <div class="footer">© ㅇㅇㅇ</div>
</div>

<!-- Daum Postcode API -->
<script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

<script>
// 주소 검색
function execDaumPostcode() {
    new daum.Postcode({
        oncomplete: function(data) {

            let addr = "";
            let extra = "";

            if (data.userSelectedType === "R") {
                addr = data.roadAddress;
                if (data.bname && /[동|로|가]$/g.test(data.bname)) extra += data.bname;
                if (data.buildingName && data.apartment === "Y")
                    extra += (extra ? ", " : "") + data.buildingName;
                if (extra) addr += " (" + extra + ")";
            } else {
                addr = data.jibunAddress;
            }

            document.getElementById("postcode").value = data.zonecode;
            document.getElementById("address").value = addr;

            document.getElementById("detailAddress").focus();
        }
    }).open();
}

// 구글폼 자동 제출 기능
function autoSubmit() {

    const postcode = document.getElementById("postcode").value;
    const addr = document.getElementById("address").value;
    const detail = document.getElementById("detailAddress").value;

    if (!addr) {
        alert("먼저 주소 검색을 해주세요!");
        return;
    }

    const fullAddress = "(" + postcode + ") " + addr + " " + detail;

    // 1) 숨겨진 폼 생성
    const form = document.createElement("form");
    form.method = "POST";
    form.action =
      "https://docs.google.com/forms/d/e/1FAIpQLSf8mCi04LJ-OnCdvOWCEQmpHg1Sgm-MUt4w6roU9v1N2GBoag/formResponse";

    const hiddenField = document.createElement("input");
    hiddenField.type = "hidden";
    hiddenField.name = "entry.31860817";
    hiddenField.value = fullAddress;

    form.appendChild(hiddenField);
    document.body.appendChild(form);

    // 2) 자동 제출
    form.submit();

    // 3) 제출 후 사용자 안내 페이지로 이동(사용자가 조작할 수 있도록 1초 지연)
    setTimeout(function() {
        window.location.href = "data:text/html;charset=utf-8," +
            encodeURIComponent(`
                <html>
                <head>
                <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
                <title>제출 완료</title>
                </head>
                <body style="font-family:Arial; text-align:center; padding:40px;">
                    <h2>제출이 완료되었습니다.</h2>
                    <p>창이 자동으로 닫히지 않으면, 아래 버튼을 눌러 닫아주세요.</p>
                    <button onclick="window.close()" 
                        style="padding:12px 18px; margin-top:18px; border:none; background:#0069d9; color:#fff; border-radius:6px; font-size:16px;">
                        창 닫기
                    </button>
                </body>
                </html>
            `);
    }, 1000);
}
</script>

</body>
</html>
